<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Kartu — Card Manager</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header>
    <h1>Card Manager</h1>
    <a href="../index.html" style="color: var(--color-accent); text-decoration: none; font-size: 14px;">← Kembali</a>
  </header>
  <main>
    <div id="detail-content" style="max-width: 600px; margin: 0 auto;">
      <div class="detail-image" style="position:relative; height:240px; border-radius:12px; margin-bottom:24px;">
        Tidak ada gambar
      </div>
      <h2 id="detail-name" style="margin-bottom:12px;"></h2>
      <p id="detail-desc" style="color: var(--color-text-muted); margin-bottom:12px;"></p>
      <span id="detail-date" style="font-size:12px; color: var(--color-text-muted);"></span>
    </div>
  </main>
  <script type="module">
    import { fetchCardById } from '../js/utils/api.js'
    import { formatDate } from '../js/utils/helpers.js'

    const params = new URLSearchParams(window.location.search)
    const id = params.get('id')
    if (id) {
      fetchCardById(id).then(card => {
        document.getElementById('detail-name').textContent = card.name
        document.getElementById('detail-desc').textContent = card.description || 'Tidak ada deskripsi.'
        document.getElementById('detail-date').textContent = formatDate(card.createdAt)
        document.title = `${card.name} — Card Manager`
      }).catch(() => {
        document.getElementById('detail-name').textContent = 'Kartu tidak ditemukan'
      })
    }
  </script>
</body>
</html>
