<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Card</title>
  <link rel="stylesheet" href="../../css/item_card(second).css" />
</head>
<body class="item-card-page">
  <main class="item-card-list" id="item-card-list" aria-live="polite">
    <p class="item-card-status">Memuat data item...</p>
  </main>

  <script type="module">
    import { fetchItems } from '../utils/api.js'

    const itemCardList = document.getElementById('item-card-list')

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    }[char]))

    const renderItemCard = (item) => `
      <article class="item-card" aria-label="${escapeHtml(item.name)}">
        <div class="item-card__image" aria-hidden="true"></div>

        <h1 class="item-card__title">${escapeHtml(item.name)}</h1>

        <div class="item-card__meta" aria-label="Informasi item">
          <span class="item-card__tag">#</span>
          <span class="item-card__id-label">ID</span>
          <span class="item-card__id-value">${escapeHtml(item.id_item)}</span>
        </div>

        <div class="item-card__actions">
          <button class="item-card__description" type="button">Description</button>
        </div>
      </article>
    `

    const loadItems = async () => {
      try {
        const items = await fetchItems()

        if (items.length === 0) {
          itemCardList.innerHTML = '<p class="item-card-status">Belum ada data item.</p>'
          return
        }

        itemCardList.innerHTML = items.map(renderItemCard).join('')
      } catch (error) {
        itemCardList.innerHTML = `<p class="item-card-status">${escapeHtml(error.message)}</p>`
      }
    }

    loadItems()
  </script>
</body>
</html>
