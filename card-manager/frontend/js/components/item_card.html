<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Card</title>
  <link rel="stylesheet" href="../../css/item_card.css" />
</head>
<body class="item-card-page">
  <article class="item-card" aria-label="Iron Chest Plate">
    <div class="item-card__image" aria-hidden="true"></div>

    <h1 class="item-card__title">Iron Chest Plate</h1>

    <div class="item-card__meta" aria-label="Informasi item">
      <span class="item-card__tag">#</span>
      <span class="item-card__id-label">ID</span>
      <span class="item-card__id-value">1408</span>
    </div>

    <div class="item-card__actions">
      <button class="item-card__description" type="button">Description</button>
      <button class="item-card__delete" type="button" aria-label="Hapus item">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M3 6h18" />
          <path d="M8 6V4h8v2" />
          <path d="M6 6l1 15h10l1-15" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
        </svg>
      </button>
    </div>
  </article>
</body>
</html>
