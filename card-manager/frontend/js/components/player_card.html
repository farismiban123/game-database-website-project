<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Card</title>
  <link rel="stylesheet" href="../../css/player_card.css" />
</head>
<body class="player-card-page">
  <main class="player-card-list" id="player-card-list" aria-live="polite">
    <p class="player-card-status">Memuat data player...</p>
  </main>

  <script type="module">
    import { fetchPlayers } from '../utils/api.js'
    import { formatDate } from '../utils/helpers.js'

    const playerCardList = document.getElementById('player-card-list')

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    }[char]))

    const renderPlayerCard = (player) => `
      <article class="player-card" aria-label="Player ${escapeHtml(player.username)}">
        <div class="player-card__content">
          <div class="player-card__image" aria-hidden="true"></div>

          <div class="player-card__details">
            <div class="player-card__info player-card__info--username">
              <span class="player-card__icon" aria-hidden="true"></span>
              <div class="player-card__text">
                <span class="player-card__label">Username</span>
                <strong class="player-card__value">${escapeHtml(player.username)}</strong>
              </div>
            </div>

            <div class="player-card__info player-card__info--id">
              <span class="player-card__tag">#</span>
              <span class="player-card__id-label">ID</span>
              <span class="player-card__id-value">${escapeHtml(player.id_player)}</span>
            </div>

            <div class="player-card__info player-card__info--date">
              <span class="player-card__icon" aria-hidden="true"></span>
              <div class="player-card__text">
                <span class="player-card__label">Join Date</span>
                <strong class="player-card__value">${formatDate(player.join_date)}</strong>
              </div>
            </div>
          </div>
        </div>

        <div class="player-card__actions">
          <button class="player-card__info-button" type="button" data-player-id="${escapeHtml(player.id_player)}">Info Player</button>
          <button class="player-card__delete-button" type="button">Delete Player</button>
        </div>
      </article>
    `

    const loadPlayers = async () => {
      try {
        const players = await fetchPlayers()

        if (players.length === 0) {
          playerCardList.innerHTML = '<p class="player-card-status">Belum ada data player.</p>'
          return
        }

        playerCardList.innerHTML = players.map(renderPlayerCard).join('')
      } catch (error) {
        playerCardList.innerHTML = `<p class="player-card-status">${escapeHtml(error.message)}</p>`
      }
    }

    playerCardList.addEventListener('click', (event) => {
      const button = event.target.closest('.player-card__info-button')
      if (!button) return

      window.location.href = `description_player.html?id_player=${encodeURIComponent(button.dataset.playerId)}`
    })

    loadPlayers()
  </script>
</body>
</html>
